<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flipbook & Admin Panel</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  
  <link href="https://dun0077.github.io/cdn/pdfflip1/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
  <link href="https://dun0077.github.io/cdn/pdfflip1/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
    .shelf {
      background-image: var(--shelf); background-size: 100% 35%;
      background-position: center bottom; background-repeat: no-repeat;
      max-width: 836px; height: var(--height); display: flex;
      align-content: center; justify-content: center; margin: auto;
    }
    ._df_thumb { width: var(--width) !important; height: var(--height) !important; margin: var(--margin) !important; }
    .title {
      background: var(--bg); color: var(--color); border: 0.5px;
      border-color: var(--color); border-radius: 30px; max-width: 836px;
      box-shadow: 5px 5px 2px var(--color); padding: 10px; margin: auto;
    }
    .admin-btn {
      position: absolute; top: 15px; right: 15px; background: #333; color: #fff;
      border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px;
    }
    .profile-btn {
      background: #17a2b8; color: #fff; border: none; padding: 10px 20px;
      border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 10px;
    }
    #admin-panel {
      display: none; max-width: 600px; margin: 40px auto; background: #fff;
      padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .submit-btn { background: #28a745; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
    .back-btn { background: #dc3545; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
    footer { text-align: center; padding: 20px; font-size: 14px; color: #333; background-color: rgba(255, 255, 255, 0.8); margin-top: 40px; border-top: 1px solid #ddd; }
  </style>
</head>
<body background="<?= config[5][1] ?>">

<button class="admin-btn" onclick="promptAdminLogin()">⚙️ จัดการระบบ</button>

<div class="container" id="main-content">
  <center>
    <br>
    <section>
      <div class="title" style="--color:<?= config[3][1] ?>; --bg:<?= config[4][1] ?>">
        <h2><?= config[2][1] ?></h2>
      </div>
    </section>
    <br>

    <? var data = getData(); ?>
    <? for (var i = 0; i < data.length; i++) { ?>
      <div class="shelf" style="--shelf:url('https://dun0077.github.io/pdfflip/images/shelf_<?= config[6][1] ?>.png'); --height:<?= config[8][1] ?>;">
        <? for (var j = 0; j < data[i].length; j++) { ?>
          <div class="_df_thumb" id="book<?= data[i][j].no ?>" source="<?= data[i][j].pdf ?>" thumb="<?= data[i][j].thumb ?>" style="--width:<?= config[9][1] ?>; --height:<?= config[10][1] ?>; --margin:<?= config[11][1] ?>;">
            <?= data[i][j].name ?>
          </div>
          <script>
            var option_book<?= data[i][j].no ?> = {
              enableDownload: <?= data[i][j].download ?>,
              text: { toggleSound: "เปิด/ปิดเสียง", toggleThumbnails: "แสดงภาพตัวอย่าง", toggleOutline: "Toggle Outline/Bookmark", previousPage: "หน้าก่อนหน้า", nextPage: "หน้าถัดไป", toggleFullscreen: "แสดงเต็มหน้าจอ", zoomIn: "ขยาย", zoomOut: "ย่อ", toggleHelp: "ช่วยเหลือ", singlePageMode: "แสดงหน้าเดียว", doublePageMode: "แสดงหน้าคู่", downloadPDFFile: "ดาวน์โหลด pdf", gotoFirstPage: "ไปยังหน้าแรก", gotoLastPage: "ไปยังหน้าสุดท้าย", play: "เริ่มเล่นอัตโนมัติ", pause: "หยุดเล่นอัตโนมัติ", share: "แบ่งปัน" }
            }
          </script>
        <? } ?>
      </div>
    <? } ?>
  </center>
</div>

<div id="admin-panel">
  <h2 style="text-align:center;">แผงควบคุมแอดมิน</h2>
  
  <button class="profile-btn" onclick="promptChangePassword()">🔑 จัดการโปรไฟล์ (เปลี่ยนรหัสผ่าน)</button>
  <hr style="margin: 20px 0; border: 0.5px solid #ddd;">
  
  <h3 style="text-align:center;">ฟอร์มอัปโหลดเอกสารใหม่</h3>
  <div class="form-group">
    <label>ชื่อหนังสือ/เอกสาร:</label>
    <input type="text" id="bookName" placeholder="ระบุชื่อเอกสาร">
  </div>
  <div class="form-group">
    <label>ไฟล์ PDF:</label>
    <input type="file" id="pdfFile" accept="application/pdf">
  </div>
  <div class="form-group">
    <label>รูปภาพหน้าปก (JPG/PNG):</label>
    <input type="file" id="imgFile" accept="image/*">
  </div>
  <button class="submit-btn" onclick="uploadFiles()">💾 อัปโหลดและบันทึก</button>
  <button class="back-btn" onclick="exitAdmin()">🚪 กลับสู่หน้าหลัก</button>
</div>

<footer>
  พัฒนาโดยนายวีระยุทธ ประชุมรักษ์ พนักงานคอมพิวเตอร์ ประจำศาลแขวงอุบลราชธานี กลุ่มงานเทคโนโลยีสารสนเทศ
</footer>

<script src="https://dun0077.github.io/cdn/pdfflip1/dflip/js/libs/jquery.min.js"></script>
<script src="https://dun0077.github.io/cdn/pdfflip1/dflip/js/dflip.min.js"></script>

<script>
  function promptAdminLogin() {
    Swal.fire({
      title: 'เข้าสู่ระบบจัดการ',
      input: 'password',
      inputAttributes: { autocapitalize: 'off' },
      showCancelButton: true,
      showDenyButton: true, 
      confirmButtonText: 'เข้าสู่ระบบ',
      cancelButtonText: 'ยกเลิก',
      denyButtonText: 'ลืมรหัสผ่าน',
      showLoaderOnConfirm: true,
      preConfirm: (password) => {
        return new Promise((resolve) => {
          google.script.run.withSuccessHandler(function(isValid) {
            if (isValid) { resolve(); } 
            else { Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง'); resolve(false); }
          }).verifyAdmin(password);
        });
      },
      allowOutsideClick: () => !Swal.isLoading()
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', showConfirmButton: false, timer: 1000 });
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        document.body.style.background = '#f4f6f9'; 
      } else if (result.isDenied) {
        triggerForgotPassword();
      }
    });
  }

  function triggerForgotPassword() {
    Swal.fire({
      title: 'ลืมรหัสผ่าน?',
      text: 'ระบบจะสุ่มรหัสผ่านใหม่และส่งไปยังอีเมลผู้ดูแลระบบ ยืนยันหรือไม่?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'ใช่, ส่งรหัสผ่านใหม่',
      cancelButtonText: 'ยกเลิก',
      showLoaderOnConfirm: true,
      preConfirm: () => {
        return new Promise((resolve) => {
          google.script.run.withSuccessHandler((res) => { resolve(res); }).forgotPassword();
        });
      }
    }).then((result) => {
      if (result.isConfirmed) {
        if (result.value.success) { Swal.fire('สำเร็จ', result.value.message, 'success'); } 
        else { Swal.fire('ผิดพลาด', result.value.message, 'error'); }
      }
    });
  }

  function promptChangePassword() {
    Swal.fire({
      title: 'เปลี่ยนรหัสผ่าน',
      html:
        '<input type="password" id="oldPass" class="swal2-input" placeholder="รหัสผ่านเดิม">' +
        '<input type="password" id="newPass" class="swal2-input" placeholder="รหัสผ่านใหม่">' +
        '<input type="password" id="confirmPass" class="swal2-input" placeholder="ยืนยันรหัสผ่านใหม่">',
      focusConfirm: false,
      showCancelButton: true,
      confirmButtonText: 'บันทึกรหัสผ่าน',
      cancelButtonText: 'ยกเลิก',
      preConfirm: () => {
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        if (!oldPass || !newPass || !confirmPass) {
          Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบถ้วน');
          return false;
        }
        if (newPass !== confirmPass) {
          Swal.showValidationMessage('รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน');
          return false;
        }
        return new Promise((resolve) => {
          google.script.run.withSuccessHandler((res) => {
            if (res.success) { resolve(); }
            else { Swal.showValidationMessage(res.message); resolve(false); }
          }).changePassword(oldPass, newPass);
        });
      }
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire('สำเร็จ!', 'รหัสผ่านของคุณถูกเปลี่ยนเรียบร้อยแล้ว', 'success');
      }
    });
  }

  function exitAdmin() {
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
    document.body.style.background = 'url("<?= config[5][1] ?>")'; 
  }

  function getBase64(file) {
    return new Promise((resolve, reject) => {
      var reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });
  }

  async function uploadFiles() {
    var bookName = document.getElementById('bookName').value;
    var pdfInput = document.getElementById('pdfFile');
    var imgInput = document.getElementById('imgFile');

    if (!bookName || pdfInput.files.length === 0 || imgInput.files.length === 0) {
      Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลและเลือกไฟล์ให้ครบถ้วน', 'warning');
      return;
    }

    Swal.fire({
      title: 'กำลังอัปโหลด...',
      text: 'กรุณารอสักครู่ ห้ามปิดหน้าต่างนี้',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading() }
    });

    try {
      var pdfBase64 = await getBase64(pdfInput.files[0]);
      var imgBase64 = await getBase64(imgInput.files[0]);

      var formData = { bookName: bookName, pdfData: pdfBase64, pdfName: pdfInput.files[0].name, imgData: imgBase64, imgName: imgInput.files[0].name, imgMime: imgInput.files[0].type };

      google.script.run.withSuccessHandler(function(response) {
        if(response.success) {
          Swal.fire('สำเร็จ!', response.message, 'success').then(() => { window.top.location.href = window.top.location.href; });
        } else {
          Swal.fire('ข้อผิดพลาด', response.message, 'error');
        }
      }).uploadData(formData);
    } catch (e) {
      Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการอ่านไฟล์', 'error');
    }
  }
</script>
</body>
</html>
