<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ระบบจัดการเอกสาร E-Book</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  
  <link href="https://dun0077.github.io/cdn/pdfflip1/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
  <link href="https://dun0077.github.io/cdn/pdfflip1/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; transition: background 0.5s; }
    #loader { text-align: center; margin-top: 20vh; font-size: 20px; font-weight: bold; color: #555; }
    .shelf {
      background-image: var(--shelf); background-size: 100% 35%;
      background-position: center bottom; background-repeat: no-repeat;
      max-width: 836px; height: var(--height); display: flex;
      align-content: center; justify-content: center; margin: auto;
    }
    ._df_thumb { width: var(--width) !important; height: var(--height) !important; margin: var(--margin) !important; cursor: pointer; }
    .title {
      background: var(--bg); color: var(--color); border: 0.5px solid var(--color); 
      border-radius: 30px; max-width: 836px; box-shadow: 5px 5px 2px var(--color); 
      padding: 10px; margin: auto; text-align: center;
    }
    .admin-btn { position: absolute; top: 15px; right: 15px; background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    .profile-btn { background: #17a2b8; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 10px; }
    #admin-panel { display: none; max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .submit-btn { background: #28a745; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
    .back-btn { background: #dc3545; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
    footer { text-align: center; padding: 20px; font-size: 14px; color: #333; background-color: rgba(255, 255, 255, 0.8); margin-top: 40px; border-top: 1px solid #ddd; }
  </style>
</head>
<body>

<button class="admin-btn" onclick="promptAdminLogin()">⚙️ จัดการระบบ</button>

<div id="loader">กำลังโหลดเอกสาร...</div>

<div class="container" id="main-content" style="display:none;">
  <center>
    <br>
    <section>
      <div class="title" id="page-title"><h2>Loading...</h2></div>
    </section>
    <br>
    <div id="book-container"></div>
  </center>
</div>

<div id="admin-panel">
  <h2 style="text-align:center;">แผงควบคุมแอดมิน</h2>
  <button class="profile-btn" onclick="promptChangePassword()">🔑 จัดการโปรไฟล์ (เปลี่ยนรหัสผ่าน)</button>
  <hr style="margin: 20px 0; border: 0.5px solid #ddd;">
  <h3 style="text-align:center;">ฟอร์มอัปโหลดเอกสารใหม่</h3>
  <div class="form-group">
    <label>ชื่อหนังสือ/เอกสาร:</label>
    <input type="text" id="bookName" placeholder="ระบุชื่อเอกสาร">
  </div>
  <div class="form-group">
    <label>ไฟล์ PDF:</label>
    <input type="file" id="pdfFile" accept="application/pdf">
  </div>
  <div class="form-group">
    <label>รูปภาพหน้าปก (JPG/PNG):</label>
    <input type="file" id="imgFile" accept="image/*">
  </div>
  <button class="submit-btn" onclick="uploadFiles()">💾 อัปโหลดไฟล์ไปที่ GitHub</button>
  <button class="back-btn" onclick="exitAdmin()">🚪 กลับสู่หน้าหลัก</button>
</div>

<footer>พัฒนาโดยนายวีระยุทธ ประชุมรักษ์ พนักงานคอมพิวเตอร์ ประจำศาลแขวงอุบลราชธานี กลุ่มงานเทคโนโลยีสารสนเทศ</footer>

<script src="https://dun0077.github.io/cdn/pdfflip1/dflip/js/libs/jquery.min.js"></script>
<script src="https://dun0077.github.io/cdn/pdfflip1/dflip/js/dflip.min.js"></script>

<script>
  // ==========================================
  // 🔗 นำลิงก์ Web App ของ Google Apps Script มาใส่ที่นี่
  // ==========================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwg6dW-eNFuKcSJld7eespNlnxCGVgnyOpExNwRrL72lKaRDSCADK3IucPVQ3-bfYVX/exec";
  let globalBgUrl = "";

  async function initApp() {
    try {
      const response = await fetch(APPS_SCRIPT_URL + "?action=getData");
      const data = await response.json();
      
      const config = data.config;
      const books = data.books;

      globalBgUrl = config[5][1];
      document.body.background = globalBgUrl;
      
      const titleDiv = document.getElementById('page-title');
      titleDiv.style.setProperty('--color', config[3][1]);
      titleDiv.style.setProperty('--bg', config[4][1]);
      titleDiv.innerHTML = `<h2>${config[2][1]}</h2>`;

      const chunkSize = parseInt(config[7][1]);
      const bookContainer = document.getElementById('book-container');
      let html = '';

      for (let i = 0; i < books.length; i += chunkSize) {
        const shelfBooks = books.slice(i, i + chunkSize);
        html += `<div class="shelf" style="--shelf:url('https://dun0077.github.io/pdfflip/images/shelf_${config[6][1]}.png'); --height:${config[8][1]};">`;
        
        shelfBooks.forEach(book => {
          html += `<div class="_df_thumb" id="book${book.no}" source="${book.pdf}" thumb="${book.thumb}" style="--width:${config[9][1]}; --height:${config[10][1]}; --margin:${config[11][1]};">${book.name}</div>`;
          
          window[`option_book${book.no}`] = {
            enableDownload: (book.download === 'true' || book.download === true),
            text: { toggleSound: "เปิด/ปิดเสียง", toggleThumbnails: "แสดงภาพตัวอย่าง", toggleFullscreen: "แสดงเต็มหน้าจอ", zoomIn: "ขยาย", zoomOut: "ย่อ" }
          };
        });
        html += `</div>`;
      }
      
      bookContainer.innerHTML = html;
      document.getElementById('loader').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      setTimeout(() => { if(window.DFLIP) window.DFLIP.parseAll(); }, 500);

    } catch (error) {
      document.getElementById('loader').innerHTML = "เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
      console.error(error);
    }
  }

  async function callAppsScript(payload) {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await response.json();
  }

  function promptAdminLogin() {
    Swal.fire({
      title: 'เข้าสู่ระบบจัดการ',
      input: 'password',
      inputAttributes: { autocapitalize: 'off' },
      showCancelButton: true, showDenyButton: true, 
      confirmButtonText: 'เข้าสู่ระบบ', cancelButtonText: 'ยกเลิก', denyButtonText: 'ลืมรหัสผ่าน',
      showLoaderOnConfirm: true,
      preConfirm: async (password) => {
        try {
          const res = await callAppsScript({ action: 'verifyAdmin', password: password });
          if (res.isValid) return true;
          Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง'); return false;
        } catch (e) {
          Swal.showValidationMessage('ติดต่อเซิร์ฟเวอร์ไม่ได้'); return false;
        }
      },
      allowOutsideClick: () => !Swal.isLoading()
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', showConfirmButton: false, timer: 1000 });
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        document.body.style.background = '#f4f6f9'; 
      } else if (result.isDenied) {
        triggerForgotPassword();
      }
    });
  }

  function triggerForgotPassword() {
    Swal.fire({
      title: 'ลืมรหัสผ่าน?', text: 'ระบบจะส่งรหัสผ่านใหม่ไปยังอีเมล ยืนยันหรือไม่?',
      icon: 'question', showCancelButton: true, confirmButtonText: 'ส่งรหัสผ่าน', cancelButtonText: 'ยกเลิก',
      showLoaderOnConfirm: true,
      preConfirm: async () => { return await callAppsScript({ action: 'forgotPassword' }); }
    }).then((result) => {
      if (result.isConfirmed) {
        result.value.success ? Swal.fire('สำเร็จ', result.value.message, 'success') : Swal.fire('ผิดพลาด', result.value.message, 'error');
      }
    });
  }

  function promptChangePassword() {
    Swal.fire({
      title: 'เปลี่ยนรหัสผ่าน',
      html: '<input type="password" id="oldPass" class="swal2-input" placeholder="รหัสผ่านเดิม"><input type="password" id="newPass" class="swal2-input" placeholder="รหัสผ่านใหม่"><input type="password" id="confirmPass" class="swal2-input" placeholder="ยืนยันรหัสผ่านใหม่">',
      focusConfirm: false, showCancelButton: true, confirmButtonText: 'บันทึก', cancelButtonText: 'ยกเลิก',
      preConfirm: async () => {
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        if (newPass !== document.getElementById('confirmPass').value) { Swal.showValidationMessage('รหัสผ่านใหม่ไม่ตรงกัน'); return false; }
        const res = await callAppsScript({ action: 'changePassword', oldPassword: oldPass, newPassword: newPass });
        if (res.success) return true;
        Swal.showValidationMessage(res.message); return false;
      }
    }).then((result) => { if (result.isConfirmed) Swal.fire('สำเร็จ!', 'รหัสผ่านเปลี่ยนเรียบร้อย', 'success'); });
  }

  function exitAdmin() {
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('admin-panel').style.display = 'none';
    document.body.style.background = `url("${globalBgUrl}")`; 
  }

  function getBase64(file) {
    return new Promise((resolve, reject) => {
      var reader = new FileReader();
      reader.readAsDataURL(file);
      // แยกรหัส Base64 ออกมาส่งไปให้ GitHub
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });
  }

  async function uploadFiles() {
    var bookName = document.getElementById('bookName').value;
    var pdfInput = document.getElementById('pdfFile');
    var imgInput = document.getElementById('imgFile');

    if (!bookName || pdfInput.files.length === 0 || imgInput.files.length === 0) {
      return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลและเลือกไฟล์ให้ครบ', 'warning');
    }

    Swal.fire({ 
      title: 'กำลังอัปโหลดไปยัง GitHub...', 
      text: 'การอัปโหลดไฟล์ขนาดใหญ่อาจใช้เวลาสักครู่ กรุณาอย่าปิดหน้าต่าง',
      allowOutsideClick: false, 
      didOpen: () => { Swal.showLoading() } 
    });

    try {
      var pdfBase64 = await getBase64(pdfInput.files[0]);
      var imgBase64 = await getBase64(imgInput.files[0]);

      var formData = { 
        action: 'uploadData', bookName: bookName, 
        pdfData: pdfBase64, pdfName: pdfInput.files[0].name, 
        imgData: imgBase64, imgName: imgInput.files[0].name, imgMime: imgInput.files[0].type 
      };

      const res = await callAppsScript(formData);
      if(res.success) {
        Swal.fire('สำเร็จ!', res.message, 'success').then(() => { location.reload(); });
      } else {
        Swal.fire('ข้อผิดพลาด', res.message, 'error');
      }
    } catch (e) {
      Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการอัปโหลด', 'error');
    }
  }

  window.onload = initApp;
</script>
</body>
</html>
